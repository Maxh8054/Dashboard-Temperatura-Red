services:
  - type: web
    name: z-report
    runtime: node
    buildCommand: bun install && bun run db:generate && bun run build
    startCommand: bun run db:push && bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: z-report-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://z-report.onrender.com

databases:
  - name: z-report-db
    databaseName: z_report
    plan: free
